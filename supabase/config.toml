[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/admin"]

# Public registration endpoints (no user JWT — validated inside the function)
[functions.create-booking]
verify_jwt = false

[functions.create-membership]
verify_jwt = false

[functions.submit-inquiry]
verify_jwt = false

# Staff-only endpoints (require authenticated session JWT)
[functions.verify-credential]
verify_jwt = true

[functions.resend-confirmation]
verify_jwt = true
